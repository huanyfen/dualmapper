name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------
  # 可选：手动生成 Gradle Wrapper JAR
  # ------------------------------------------------------------
  generate-wrapper:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Upload wrapper jar as artifact
        uses: actions/upload-artifact@v4
        with:
          name: gradle-wrapper-jar
          path: |
            gradle/wrapper/gradle-wrapper.jar
            gradle/wrapper/gradle-wrapper.properties
            gradlew
          retention-days: 7

  # ------------------------------------------------------------
  # 单元测试（包含 r8.zip 解压）
  # ------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 如果仓库根目录存在 r8.zip，则解压并覆盖到项目中
      - name: Extract r8.zip (if exists)
        run: |
          if [ -f "r8.zip" ]; then
            echo "Found r8.zip, extracting..."
            unzip -o r8.zip -d ./
            rm r8.zip   # 可选：删除压缩包节省空间
          else
            echo "No r8.zip found, skipping extraction."
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 7

  # ------------------------------------------------------------
  # 构建 Debug APK（包含 r8.zip 解压）
  # ------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 同样解压 r8.zip（若存在）
      - name: Extract r8.zip (if exists)
        run: |
          if [ -f "r8.zip" ]; then
            echo "Found r8.zip, extracting..."
            unzip -o r8.zip -d ./
            rm r8.zip
          else
            echo "No r8.zip found, skipping extraction."
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          org.gradle.caching=true
          kapt.use.worker.api=false
          kapt.incremental.apt=false
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Extract version info
        id: version
        run: |
          VERSION=$(grep versionName app/build.gradle.kts | head -1 | sed "s/.*versionName = \"\(.*\)\"/\1/")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DualMapper-${{ steps.version.outputs.version }}-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
