name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------
  # 新增：生成 Gradle Wrapper JAR（仅在手动触发或需要时执行）
  # 产物下载后需手动提交到仓库 gradle/wrapper/ 目录
  # ------------------------------------------------------------
  generate-wrapper:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'   # 仅手动触发
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Upload wrapper jar as artifact
        uses: actions/upload-artifact@v4
        with:
          name: gradle-wrapper-jar
          path: |
            gradle/wrapper/gradle-wrapper.jar
            gradle/wrapper/gradle-wrapper.properties
            gradlew
          retention-days: 7

  # ------------------------------------------------------------
  # 单元测试（依赖仓库中已存在 gradle-wrapper.jar）
  # ------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: []   # 不依赖 generate-wrapper
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 7

  # ------------------------------------------------------------
  # 构建 Debug APK（依赖测试通过）
  # ------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          org.gradle.caching=true
          kapt.use.worker.api=false
          kapt.incremental.apt=false
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Extract version info
        id: version
        run: |
          VERSION=$(grep versionName app/build.gradle.kts | head -1 | sed "s/.*versionName = \"\(.*\)\"/\1/")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DualMapper-${{ steps.version.outputs.version }}-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
